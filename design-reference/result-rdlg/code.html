<style>
        body {

            color: theme('colors.on-surface');

            display: flex;
            flex-direction: column;
        }

            background-color: theme('colors.surface-glass');
            backdrop-filter: blur(12px);
            border: 1px solid theme('colors.outline-variant');
            border-radius: theme('borderRadius.xl');
        }

        .glow-btn-primary {
            background-color: theme('colors.primary-container');
            color: theme('colors.on-primary-container');
            box-shadow: 0 0 15px theme('colors.primary-container');
            transition: all 0.2s ease-in-out;
        }

            box-shadow: 0 0 25px theme('colors.primary');
            transform: scale(1.02);
        }

            background-color: transparent;
            color: theme('colors.primary');
            border: 1px solid theme('colors.primary');
            transition: all 0.2s ease-in-out;
        }

            box-shadow: 0 0 10px rgba(173, 198, 255, 0.3);
        }

            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 70%);
        }

            fill: rgba(77, 142, 255, 0.3);
            stroke: theme('colors.primary');

                </p>
</div>

<div class="relative w-64 h-64">
<svg class="w-full h-full transform -rotate-90" viewBox="0 0 200 200">
<!-- Background Axes -->
<line class="radar-axis" x1="100" x2="100" y1="100" y2="20"></line>
<line class="radar-axis" x1="100" x2="180" y1="100" y2="100"></line>
<line class="radar-axis" x1="100" x2="100" y1="100" y2="180"></line>
<line class="radar-axis" x1="100" x2="20" y1="100" y2="100"></line>
<!-- Concentric Circles (optional grid) -->
<circle cx="100" cy="100" fill="none" r="80" stroke="rgba(66, 71, 84, 0.2)"></circle>
<circle cx="100" cy="100" fill="none" r="40" stroke="rgba(66, 71, 84, 0.2)"></circle>
<!-- Data Polygon -->
<!-- Points mapping roughly to: High Risk, High Data, High Long-term, Very High Growth -->
<polygon class="radar-polygon" points="100,30 170,100 100,160 40,100"></polygon>
<!-- Axis Labels -->
<text class="font-label-mono text-[8px]" fill="#94A3B8" text-anchor="middle" transform="rotate(90 100 15)" x="100" y="15">Risk-taking</text>
<text class="font-label-mono text-[8px]" fill="#94A3B8" text-anchor="start" transform="rotate(90 185 103)" x="185" y="103">Data-driven</text>

<text class="font-label-mono text-[8px]" fill="#94A3B8" text-anchor="end" transform="rotate(90 15 103)" x="15" y="103">Growth</text>
